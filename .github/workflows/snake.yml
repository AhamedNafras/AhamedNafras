name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Generate dark neon snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: AhamedNafras
          outputs: |
            dist/snake-dark.svg?palette=github-dark&color_snake=00ffe0&color_dots=#161b22,#1f2a44,#00bfa6,#00ffe0,#7c3aed

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
